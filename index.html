<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="inputArea">
      <div class="listTitle">输入列表</div>
      <div class="DRAG input">📥 点击或拖入源文件/文件夹至此</div>
      <div class="inputBtn">
        <button class="empty">清空列表</button>
        <button class="reset">取消选中</button>
        <button class="remove">移出列表</button>
      </div>
      <div class="INPUT"></div>
    </div>
    <div class="actor">
      <button class="copyToOutput">复制到目标目录 →</button>
      <button class="openDir">在资源管理器中打开</button>
      <button class="deleteSelected" style="color: #ff4d4f">
        彻底删除 (本地文件)
      </button>
      <button class="renameSelected">重命名所选文件</button>
      <button class="addToInput">← 提取到输入列表</button>
    </div>
    <div class="outputArea">
      <div class="listTitle">输出列表</div>
      <div class="DRAG output">📂 点击或拖入目标目录至此</div>
      <div class="outputBtn">
        <button class="empty">清空列表</button>
        <button class="reset">取消选中</button>
        <button class="remove">移出列表</button>
      </div>
      <div class="OUTPUT"></div>
    </div>

    <!-- 重命名对话框 -->
    <div id="renameDialog" class="dialog">
      <div class="dialog-content">
        <h3>重命名文件</h3>
        <div class="rename-options">
          <div class="option">
            <input
              type="radio"
              id="directRename"
              name="renameMode"
              value="direct"
              checked
            />
            <label for="directRename">直接重命名</label>
          </div>
          <div class="option">
            <input
              type="radio"
              id="regexRename"
              name="renameMode"
              value="regex"
            />
            <label for="regexRename">正则替换</label>
          </div>
          <div class="option">
            <input
              type="radio"
              id="indexRename"
              name="renameMode"
              value="index"
            />
            <label for="indexRename">添加序号</label>
          </div>
        </div>
        <div class="rename-inputs">
          <div class="input-group direct-only">
            <label for="newName">新名称：</label>
            <input type="text" id="newName" placeholder="输入新名称" />
          </div>
          <div class="input-group regex-only">
            <label for="regexPattern">正则表达式：</label>
            <input type="text" id="regexPattern" placeholder="输入正则表达式" />
          </div>
          <div class="input-group regex-only">
            <label for="regexReplacement">替换为：</label>
            <input
              type="text"
              id="regexReplacement"
              placeholder="输入替换内容"
            />
          </div>
        </div>
        <div class="preview">
          <div class="preview-header">
            <span>原名称</span>
            <span>→</span>
            <span>新名称</span>
          </div>
          <div id="renamePreview"></div>
        </div>
        <div class="dialog-buttons">
          <button id="cancelRename">取消</button>
          <button id="confirmRename">确认</button>
        </div>
      </div>
    </div>
  </body>
  <script src="https://cdn.staticfile.net/jquery/3.7.1/jquery.min.js"></script>
  <script src="index.js?version=1.0.0"></script>
</html>
